global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - '/etc/prometheus/alert.rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'linkiving-core'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'blue:8080'
          - 'green:8080'
        labels:
          application: 'linkiving-core'
