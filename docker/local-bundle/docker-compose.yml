services:
  app:
    image: __IMAGE_TAG__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DB_URL=jdbc:postgresql://postgres:5432/linkiving_local
      - DB_USERNAME=linkiving
      - DB_PASSWORD=linkiving
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVER_URL=http://api.linkiving.com:5678
      - SERVER_ADDRESS=0.0.0.0
      - TZ=Asia/Seoul
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=linkiving_local
      - POSTGRES_USER=linkiving
      - POSTGRES_PASSWORD=linkiving
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkiving -d linkiving_local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
