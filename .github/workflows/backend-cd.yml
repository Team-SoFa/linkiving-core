name: вңЁ Linkiving backend CD вңЁ

on:
  workflow_dispatch:
  pull_request:
    types: [ closed ]
    branches:
      - main

jobs:
  backend-docker-build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: вңЁ Checkout repository
        uses: actions/checkout@v3

      - name: вңЁ JDK 17 м„Өм •
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: вңЁ Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: рҹ—ӮпёҸ Make config
        run: |
          # src/main/resources кІҪлЎң мқҙлҸҷ
          mkdir -p ./src/main/resources
          cd ./src/main/resources

          # yml нҢҢмқј мғқм„ұ

          touch ./application.yml
          echo "$APPLICATION" > ./application.yml

        env:
          APPLICATION: ${{ secrets.APPLICATION }}
        shell: bash

      - name: вңЁ Gradlew к¶Ңн•ң м„Өм •
        run: chmod +x ./gradlew

      - name: вңЁ Jar нҢҢмқј л№Ңл“ң
        run: |
          ./gradlew bootJar

      - name: вңЁ DockerHubм—җ лЎңк·ёмқё
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: вңЁ Docker Image л№Ңл“ң нӣ„ DockerHubм—җ Push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:latest

  backend-docker-pull-and-run:
    runs-on: [ self-hosted, prod ]
    needs: [ backend-docker-build-and-push ]
    if: ${{ needs.backend-docker-build-and-push.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true) }}

    steps:
      - name: вңЁ Checkout repository
        uses: actions/checkout@v5

      - name: рҹ—ӮпёҸ Make monitoring config
        run: |
          # Prometheus м„Өм •
          mkdir -p ./docker
          echo "$PROMETHEUS_YML" > ./docker/prometheus.yml

          # Grafana provisioning м„Өм •
          mkdir -p ./docker/grafana/provisioning/datasources
          mkdir -p ./docker/grafana/provisioning/dashboards
          mkdir -p ./docker/grafana/dashboards

          echo "$GRAFANA_DATASOURCE_YML" > ./docker/grafana/provisioning/datasources/prometheus.yml
          echo "$GRAFANA_DASHBOARD_PROVIDER_YML" > ./docker/grafana/provisioning/dashboards/dashboards.yml
          echo "$GRAFANA_DASHBOARD_JSON" > ./docker/grafana/dashboards/http-overview.json

          # Grafana нҷҳкІҪліҖмҲҳ
          echo "$DOCKER_ENV" > ./docker/.env
        env:
          PROMETHEUS_YML: ${{ secrets.PROMETHEUS_YML }}
          GRAFANA_DATASOURCE_YML: ${{ secrets.GRAFANA_DATASOURCE_YML }}
          GRAFANA_DASHBOARD_PROVIDER_YML: ${{ secrets.GRAFANA_DASHBOARD_PROVIDER_YML }}
          GRAFANA_DASHBOARD_JSON: ${{ secrets.GRAFANA_DASHBOARD_JSON }}
          DOCKER_ENV: ${{ secrets.DOCKER_ENV }}
        shell: bash

      - name: вңЁ л°°нҸ¬ мҠӨнҒ¬лҰҪнҠё мӢӨн–ү
        run: |
          chmod +x deploy.sh
          ./deploy.sh
