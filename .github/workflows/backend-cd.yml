name: ✨ Linkiving backend CD ✨

on:
  workflow_dispatch:
  pull_request:
    types: [ closed ]
    branches:
      - main

jobs:
  backend-docker-build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: ✨ Checkout repository
        uses: actions/checkout@v3

      - name: ✨ JDK 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ✨ Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🗂️ Make config
        run: |
          # src/main/resources 경로 이동
          mkdir -p ./src/main/resources
          cd ./src/main/resources

          # yml 파일 생성

          touch ./application.yml
          echo "$APPLICATION" > ./application.yml

        env:
          APPLICATION: ${{ secrets.APPLICATION }}
        shell: bash

      - name: ✨ Gradlew 권한 설정
        run: chmod +x ./gradlew

      - name: ✨ Jar 파일 빌드
        run: |
          ./gradlew bootJar

      - name: ✨ DockerHub에 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: ✨ Docker Image 빌드 후 DockerHub에 Push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:latest

  backend-docker-pull-and-run:
    runs-on: [ self-hosted, prod ]
    needs: [ backend-docker-build-and-push ]
    if: ${{ needs.backend-docker-build-and-push.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true) }}

    steps:
      - name: ✨ Checkout repository
        uses: actions/checkout@v5

      - name: 🗂️ Grafana 환경변수 설정
        run: |
          echo "GRAFANA_ADMIN_USER=admin" > ./docker/.env
          echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" >> ./docker/.env
        shell: bash

      - name: 🗂️ Alertmanager 알림 채널 설정
        shell: bash
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERTMANAGER_DISCORD_WEBHOOK_URL: ${{ secrets.AlERTMANAGER_DISCORD_WEBHOOK_URL }}
        run: |
          printf '%s' "$SMTP_PASSWORD" > ./docker/alerting/smtp_password
          chmod 600 ./docker/alerting/smtp_password
          printf '%s' "$ALERTMANAGER_DISCORD_WEBHOOK_URL" > ./docker/alerting/discord_webhook
          chmod 600 ./docker/alerting/discord_webhook

      - name: ✨ 배포 스크립트 실행
        run: |
          chmod +x deploy.sh
          ./deploy.sh
